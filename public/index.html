<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chào mừng — My Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <nav class="topnav">
            <a class="logo" href="index.html">MyShop</a>
            <ul class="navlinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>

        <header class="hero">
            <h1 id="welcome">Chào mừng đến với trang của tôi</h1>
            <p class="subtitle">Phiên bản 1.1 — GitHub deploy</p>
        </header>

        <main>
            <div class="card">
                <p class="lead">Thank you for visiting. Enjoy your stay!</p>

                <form action="/api/login" method="POST" class="login-form">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>

                    <div class="actions">
                        <button type="submit" class="btn primary">Login</button>
                        <button type="reset" class="btn">Reset</button>
                    </div>
                </form>
            </div>
        </main>

        <footer class="site-footer">Made with ❤️</footer>
    </div>
    <script src="scripts.js"></script>
</body>

</html>
