name: Build and Push to ECR

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: nodejs-demo
  AWS_ACCOUNT_ID: 378595784342

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ env.ECR_REPOSITORY }}:${{github.ref_name}} .

      - name: Tag Docker image
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:${{github.ref_name}} ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{github.ref_name}}

      - name: Push Docker image to ECR
        run: |
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{github.ref_name}}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
              aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin 378595784342.dkr.ecr.ap-southeast-1.amazonaws.com
              docker pull 378595784342.dkr.ecr.ap-southeast-1.amazonaws.com/nodejs-demo:${{ github.ref_name }}
              docker stop nodejs-demo || true
              docker rm nodejs-demo || true
              docker run -d --name nodejs-demo -p 80:3000 378595784342.dkr.ecr.ap-southeast-1.amazonaws.com/nodejs-demo:${{ github.ref_name }}
